services:
  postgres:
    image: postgres:17-alpine
    container_name: sportmax_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportmax_db
      POSTGRES_USER: sportmax
      POSTGRES_PASSWORD: sportmax
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sportmax_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
