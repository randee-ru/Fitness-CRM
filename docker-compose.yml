services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: sportmax_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportmax_db
      POSTGRES_USER: sportmax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sportmax}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportmax -d sportmax_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sportmax_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sportmax}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sportmax}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sportmax_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sportmax:${POSTGRES_PASSWORD:-sportmax}@postgres:5432/sportmax_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-sportmax}@redis:6379
      API_PORT: 7777
    ports:
      - "7777:7777"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ─── Next.js Web ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sportmax_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:7777
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ─── Caddy (reverse proxy) ────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: sportmax_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
